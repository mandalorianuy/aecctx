name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PYTHON: python
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - run: python -m pip install --disable-pip-version-check '.[test]'
      - run: ./scripts/verify_portable.sh
      - run: ./scripts/verify_release.sh
      - run: gh release create "$GITHUB_REF_NAME" dist/aecctx-0.1.0* dist/SHA256SUMS dist/aecctx-0.1.0.spdx.json --title "AECCTX 0.1.0" --notes-file docs/releases/v0.1.0.md --verify-tag
