name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      PYTHON: python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check '.[test]'
        shell: bash
      # The full verify additionally resolves the private codex-agent-baseline
      # runtime. Public CI runs the portable contract gate; maintainers run the
      # full baseline integration check locally before merge/release.
      # ACX-24 binds all six live receipts/results by digest without treating
      # hosted-runner Docker availability as live provider evidence.
      - run: ./scripts/verify_portable.sh
        shell: bash
