name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check '.[test]'
      # The full verify additionally resolves the private codex-agent-baseline
      # runtime. Public CI runs the portable contract gate; maintainers run the
      # full baseline integration check locally before merge/release.
      - run: ./scripts/verify_portable.sh
